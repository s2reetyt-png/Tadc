<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// VR rig (this moves in VR)
const rig = new THREE.Group();
scene.add(rig);
rig.add(camera);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
scene.add(new THREE.DirectionalLight(0xffffff, 1));

// ================= WORLD =================
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({ color: 0x44aa44 })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// water
const water = new THREE.Mesh(
  new THREE.CircleGeometry(15, 32),
  new THREE.MeshStandardMaterial({ color: 0x3399ff, transparent: true, opacity: 0.6 })
);
water.rotation.x = -Math.PI/2;
water.position.set(20,0.1,0);
scene.add(water);

// ================= VR HANDS =================
const controllers = [];

function makeController(index) {
  const controller = renderer.xr.getController(index);

  const hand = new THREE.Mesh(
    new THREE.BoxGeometry(0.15,0.15,0.4),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );

  controller.add(hand);
  scene.add(controller);

  controllers[index] = controller;
}

makeController(0);
makeController(1);

// ================= VR MOVEMENT =================
// Left stick = move forward/back/strafe
let moveVector = new THREE.Vector3();

function setupThumbstick(controller) {
  controller.addEventListener('connected', e => {
    if (e.data && e.data.handedness === 'left') {
      controller.gamepad = e.data.gamepad;
    }
  });
}

setupThumbstick(controllers[0]);

function updateVRMovement() {
  const left = controllers[0];

  if (!left || !left.gamepad) return;

  const axes = left.gamepad.axes;

  const x = axes[2] || 0;
  const y = axes[3] || 0;

  const speed = 0.06;

  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

  rig.position.addScaledVector(forward, -y * speed);
  rig.position.addScaledVector(right, x * speed);

  // swim zone
  if (rig.position.distanceTo(water.position) < 12) {
    rig.position.y = 1.3 + Math.sin(Date.now()*0.003)*0.2;
  } else {
    rig.position.y = 0;
  }
}

// ================= CAINE + BUBBLE =================
function createBlock(pos, color=0xff0000){
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color })
  );
  b.position.copy(pos);
  scene.add(b);
}

class Character {
  constructor(mesh, canBuild){
    this.mesh = mesh;
    this.canBuild = canBuild;
    this.target = mesh.position.clone();
    scene.add(mesh);
  }

  update(){
    if (this.mesh.position.distanceTo(this.target) < 0.5) {
      this.target.set(
        (Math.random()-0.5)*30,
        1,
        (Math.random()-0.5)*30
      );

      if (this.canBuild) {
        for (let i=0;i<3;i++){
          createBlock(this.mesh.position.clone().add(new THREE.Vector3(i,0,0)));
        }
      }
    }

    this.mesh.position.lerp(this.target,0.03);
  }
}

// CAINE (BUILDS)
const caine = new Character(
  new THREE.Mesh(
    new THREE.CapsuleGeometry(0.5,1.5),
    new THREE.MeshStandardMaterial({ color:0xff0000 })
  ),
  true
);
caine.mesh.position.set(-5,1,-5);

// BUBBLE (NO BUILD)
const bubble = new Character(
  new THREE.Mesh(
    new THREE.SphereGeometry(0.5),
    new THREE.MeshStandardMaterial({ color:0x00ffff })
  ),
  false
);
bubble.mesh.position.set(5,1,-5);

// ================= SIMPLE COASTER =================
let t = 0;

const path = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,2,0),
  new THREE.Vector3(5,3,-5),
  new THREE.Vector3(0,4,-10),
  new THREE.Vector3(-5,3,-5),
  new THREE.Vector3(0,2,0)
]);

const cart = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.5,1),
  new THREE.MeshStandardMaterial({ color:0xff0000 })
);
scene.add(cart);

// ================= LOOP =================
renderer.setAnimationLoop(()=>{

  updateVRMovement();

  // coaster
  t += 0.0015;
  if (t > 1) t = 0;

  const pos = path.getPointAt(t);
  cart.position.copy(pos);

  // AI
  caine.update();
  bubble.update();

  renderer.render(scene,camera);
});

// ================= RESIZE =================
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
