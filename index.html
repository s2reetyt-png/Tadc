<!DOCTYPE html>

<html>
<head>
  <title>Caine & Bubble VR Circus Full - Smart AI</title>
  <style>body{margin:0;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ===== Scene & Camera =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const rig = new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

// ===== Renderer =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ===== Lights =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const dir = new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== Globals =====
let heldObject=null;
let inventory=[];
let inventoryIndex=0;

// ===== AdventureObject =====
class AdventureObject {
constructor(mesh,type){
this.mesh=mesh;
this.type=type;
scene.add(mesh);
}
}

// ===== Character =====
class Character {
constructor(mesh,name){
this.mesh=mesh; this.name=name;
this.blocksPlaced=[]; this.targetPos=null;
this.currentStructure=null;
this.dialogQueue=[];
this.visible=true;
this.createBubble();
scene.add(mesh);
}
createBubble(){
const canvas=document.createElement('canvas');
canvas.width=512; canvas.height=128;
this.ctx=canvas.getContext('2d');
const texture=new THREE.CanvasTexture(canvas);
const material=new THREE.MeshBasicMaterial({map:texture,transparent:true});
this.bubbleMesh=new THREE.Mesh(new THREE.PlaneGeometry(3,1),material);
scene.add(this.bubbleMesh);
this.texture=texture;
}
updateBubble(text){
this.ctx.clearRect(0,0,512,128);
this.ctx.fillStyle="white";
this.ctx.font="40px Arial";
this.ctx.fillText(text,10,60);
this.texture.needsUpdate=true;
}
moveToward(target,speed=0.15){
const dir=new THREE.Vector3().subVectors(target,this.mesh.position);
if(dir.length()<speed){this.mesh.position.copy(target);return true;}
dir.normalize(); this.mesh.position.add(dir.multiplyScalar(speed));
return false;
}
speak(text){
if('speechSynthesis' in window){
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
this.updateBubble(text);
}
updateBubblePosition(){
this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2,this.mesh.position.z);
this.bubbleMesh.lookAt(camera.position);
}
}

// ===== Characters =====
const bubble=new Character(
new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color:0x00ffcc})),"Bubble"
);
const caine=new Character(
new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.5),new THREE.MeshStandardMaterial({color:0xff4444})),"Caine"
);
caine.mesh.position.set(-5,0.75,-5);

// ===== Types =====
const objectTypes=[
'cube','cylinder','sphere','cone','torus','pyramid'
];
const colors=[0xff0000,0x00ff00,0x0000ff,0xffff00,0xff00ff,0x00ffff];

// ===== Create Block =====
function createBlockOfType(type,pos){
let mesh;
const color=colors[Math.floor(Math.random()*colors.length)];

switch(type){
case 'cube': mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color})); break;
case 'cylinder': mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1),new THREE.MeshStandardMaterial({color})); break;
case 'sphere': mesh=new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color})); break;
case 'cone': mesh=new THREE.Mesh(new THREE.ConeGeometry(0.5,1),new THREE.MeshStandardMaterial({color})); break;
case 'torus': mesh=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.2,16,32),new THREE.MeshStandardMaterial({color})); break;
case 'pyramid': mesh=new THREE.Mesh(new THREE.ConeGeometry(0.7,1,4),new THREE.MeshStandardMaterial({color})); break;
}

mesh.position.copy(pos);

// label
const canvas=document.createElement('canvas');
canvas.width=256; canvas.height=64;
const ctx=canvas.getContext('2d');
ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.fillText(type,10,40);
const tex=new THREE.CanvasTexture(canvas);

const label=new THREE.Mesh(
new THREE.PlaneGeometry(1,0.25),
new THREE.MeshBasicMaterial({map:tex,transparent:true})
);
label.position.set(0,1,0);
mesh.add(label);

return new AdventureObject(mesh,type);
}

// ===== Pickup / Place =====
function tryPickup(){
let closest=null;
let min=2;

scene.traverse(o=>{
if(o.isMesh){
const d=o.position.distanceTo(camera.position);
if(d<min){closest=o;min=d;}
}
});

if(closest){
inventory.push(closest.userData.type || "cube");
closest.visible=false;
}
}

function dropObject(){
if(inventory.length===0) return;
const type=inventory[inventoryIndex];

const pos=camera.position.clone()
.add(new THREE.Vector3(0,0,-2).applyQuaternion(camera.quaternion));

pos.x=Math.round(pos.x);
pos.y=Math.round(pos.y);
pos.z=Math.round(pos.z);

createBlockOfType(type,pos);
}

// ===== Destroy =====
function destroyBlock(){
let closest=null; let min=2;
scene.traverse(o=>{
if(o.isMesh){
const d=o.position.distanceTo(camera.position);
if(d<min){closest=o;min=d;}
}
});
if(closest) scene.remove(closest);
}

// ===== Inventory =====
function nextItem(){
if(inventory.length===0) return;
inventoryIndex=(inventoryIndex+1)%inventory.length;
}

// ===== Controls =====
window.addEventListener('keydown',e=>{
if(e.key==='e') tryPickup();
if(e.key==='q') dropObject();
if(e.key==='f') destroyBlock();
if(e.key==='r') nextItem();
});

// ===== AI =====
function characterThink(c){
if(!c.currentStructure){
c.currentStructure={
type:['wall','pillar','tower'][Math.random()*3|0],
origin:c.mesh.position.clone(),
step:0
};
c.speak("Building "+c.currentStructure.type);
}

const s=c.currentStructure;
let target=new THREE.Vector3();

if(s.type==='pillar'){
target.set(s.origin.x,s.origin.y+s.step,s.origin.z);
}
if(s.type==='wall'){
const w=5;
target.set(s.origin.x+(s.step%w),s.origin.y+Math.floor(s.step/w),s.origin.z);
}
if(s.type==='tower'){
target.set(
s.origin.x+Math.sin(s.step)*2,
s.origin.y+s.step*0.5,
s.origin.z+Math.cos(s.step)*2
);
}

if(c.moveToward(target)){
createBlockOfType(objectTypes[Math.random()*objectTypes.length|0],target);
s.step++;
if(s.step>20) c.currentStructure=null;
}

c.updateBubblePosition();
}

// ===== Animate =====
renderer.setAnimationLoop(()=>{
characterThink(caine);
characterThink(bubble);
renderer.render(scene,camera);
}); </script>

</body>
</html>
