<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xffccff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const rig=new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ===== UI =====
const ui=document.createElement("div");
ui.style.position="absolute";
ui.style.top="10px";
ui.style.left="10px";
ui.style.color="white";
ui.style.fontFamily="monospace";
ui.innerHTML="Loading...";
document.body.appendChild(ui);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// ===== CIRCUS FLOOR =====
const floor=new THREE.Mesh(
new THREE.CircleGeometry(30,64),
new THREE.MeshStandardMaterial({color:0xff4444})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

// ===== CIRCUS WALL =====
const wall=new THREE.Mesh(
new THREE.CylinderGeometry(30,30,20,32,1,true),
new THREE.MeshStandardMaterial({
color:0xffffff,
side:THREE.DoubleSide,
wireframe:false
})
);
wall.position.y=10;
scene.add(wall);

// ===== DATA =====
let blocks=[];
let inventory=[
{type:'cube',color:0xff0000},
{type:'cylinder',color:0x00ff00},
{type:'cone',color:0x0000ff}
];
let inventoryIndex=0;

// ===== BLOCK =====
function getGeo(type){
if(type==='cube') return new THREE.BoxGeometry(1,1,1);
if(type==='cylinder') return new THREE.CylinderGeometry(0.5,0.5,1);
if(type==='cone') return new THREE.ConeGeometry(0.6,1);
if(type==='pyramid') return new THREE.ConeGeometry(0.7,1,4);
}

function createBlock(type,pos,color){
const mesh=new THREE.Mesh(
getGeo(type),
new THREE.MeshStandardMaterial({color})
);
mesh.position.copy(pos);
mesh.userData={type,color};
scene.add(mesh);
blocks.push(mesh);
return mesh;
}

// ===== GHOST =====
let ghost=new THREE.Mesh(getGeo('cube'),
new THREE.MeshBasicMaterial({transparent:true,opacity:0.3})
);
scene.add(ghost);

// ===== HELPERS =====
function getForwardPos(){
const pos=camera.position.clone().add(
new THREE.Vector3(0,0,-2).applyQuaternion(camera.quaternion)
);
pos.x=Math.round(pos.x);
pos.y=Math.round(pos.y);
pos.z=Math.round(pos.z);
return pos;
}

function getClosest(){
let closest=null,dist=3;
blocks.forEach(b=>{
const d=b.position.distanceTo(camera.position);
if(d<dist){closest=b;dist=d;}
});
return closest;
}

// ===== ACTIONS =====
function pickup(){
const obj=getClosest();
if(!obj) return;

inventory.push(obj.userData);
scene.remove(obj);
blocks=blocks.filter(b=>b!==obj);
}

function place(){
const item=inventory[inventoryIndex];
createBlock(item.type,getForwardPos(),item.color);
}

function destroy(){
const obj=getClosest();
if(!obj) return;

scene.remove(obj);
blocks=blocks.filter(b=>b!==obj);
}

function nextItem(){
inventoryIndex=(inventoryIndex+1)%inventory.length;
}

// ===== SAVE / LOAD =====
function save(){
localStorage.setItem("tadc_world",
JSON.stringify(blocks.map(b=>({
type:b.userData.type,
color:b.userData.color,
pos:b.position
}))));
}

function load(){
blocks.forEach(b=>scene.remove(b));
blocks=[];

const data=JSON.parse(localStorage.getItem("tadc_world")||"[]");
data.forEach(d=>{
createBlock(d.type,new THREE.Vector3(d.pos.x,d.pos.y,d.pos.z),d.color);
});
}

// ===== KEYBOARD =====
window.addEventListener('keydown',e=>{
if(e.key==='e') pickup();
if(e.key==='q') place();
if(e.key==='f') destroy();
if(e.key==='r') nextItem();
if(e.key==='k') save();
if(e.key==='l') load();
});

// ===== VR HANDS =====
function makeController(i){
const c=renderer.xr.getController(i);

const hand=new THREE.Mesh(
new THREE.BoxGeometry(0.1,0.1,0.3),
new THREE.MeshStandardMaterial({color:0xffffff})
);
c.add(hand);

c.addEventListener('selectstart',place);
c.addEventListener('squeezestart',pickup);

scene.add(c);
}
makeController(0);
makeController(1);

// ===== CHARACTERS =====
class Character{
constructor(mesh){
this.mesh=mesh;
this.target=this.mesh.position.clone();
scene.add(mesh);
}

update(){
if(this.mesh.position.distanceTo(this.target)<0.5){
this.target.set(
(Math.random()-0.5)*20,
1,
(Math.random()-0.5)*20
);

// build sometimes
if(Math.random()<0.4){
createBlock(
['cube','cylinder','cone'][Math.floor(Math.random()*3)],
this.mesh.position.clone().add(new THREE.Vector3(1,0,0)),
Math.random()*0xffffff
);
}
}

this.mesh.position.lerp(this.target,0.03);
}
}

// ===== CAINE + BUBBLE =====
const caine=new Character(
new THREE.Mesh(
new THREE.CapsuleGeometry(0.5,1.5),
new THREE.MeshStandardMaterial({color:0xff0000})
));
caine.mesh.position.set(-5,1,-5);

const bubble=new Character(
new THREE.Mesh(
new THREE.SphereGeometry(0.5),
new THREE.MeshStandardMaterial({color:0x00ffff})
));
bubble.mesh.position.set(5,1,-5);

// ===== LOOP =====
renderer.setAnimationLoop(()=>{

// ghost update
const item=inventory[inventoryIndex];
const pos=getForwardPos();

ghost.geometry.dispose();
ghost.geometry=getGeo(item.type);
ghost.material.color.set(item.color);
ghost.position.copy(pos);

// update UI
ui.innerHTML=
"Item: "+item.type+
"<br>Inventory: "+inventory.length+
"<br>E=pickup Q=place F=delete R=switch"+
"<br>K=save L=load";

// AI
caine.update();
bubble.update();

renderer.render(scene,camera);
});

// ===== RESIZE =====
addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>
