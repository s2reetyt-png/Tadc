<!DOCTYPE html>
<html>
<head>
  <title>Caine & Bubble VR Circus Enhanced</title>
  <style>body{margin:0;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ===== Scene & Camera =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // daytime sky
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// ===== VR Rig =====
const rig = new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

// ===== Renderer =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ===== Lights =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const dir = new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

// ===== Ground =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x444444, roughness:0.8, metalness:0})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== Adventure Object Class =====
class AdventureObject {
  constructor(mesh,type){
    this.mesh=mesh;
    this.type=type;
    scene.add(mesh);
  }
}

// ===== Character Class =====
class Character {
  constructor(mesh,name){
    this.mesh=mesh;
    this.name=name;
    this.blocksPlaced=[];
    this.targetPos=null;
    this.currentStructure=null;
    this.dialogQueue=[];
    this.knowledge={colorsSeen:new Set(),structuresSeen:[],objectsSeen:new Set()};
    this.visible=true;
    this.createBubble();
    scene.add(mesh);
  }

  createBubble(){
    const canvas=document.createElement('canvas');
    canvas.width=1024; canvas.height=256;
    this.ctx=canvas.getContext('2d');
    const texture=new THREE.CanvasTexture(canvas);
    const material=new THREE.MeshBasicMaterial({map:texture,transparent:true});
    this.bubbleMesh=new THREE.Mesh(new THREE.PlaneGeometry(6,1.5),material);
    this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2.5,this.mesh.position.z);
    scene.add(this.bubbleMesh);
    this.texture=texture;
    this.updateBubble("");
  }

  updateBubble(text){
    this.ctx.clearRect(0,0,1024,256);
    this.ctx.fillStyle="white";
    this.ctx.font="96px Arial";
    this.ctx.fillText(text,20,160);
    this.texture.needsUpdate=true;
    this.bubbleText=text;
  }

  moveToward(target,speed=0.15){ // faster
    if(!this.visible) return true;
    const dir=new THREE.Vector3().subVectors(target,this.mesh.position);
    const distance=dir.length();
    if(distance<speed){
      this.mesh.position.copy(target);
      return true;
    }
    dir.normalize();
    this.mesh.position.add(dir.multiplyScalar(speed));
    return false;
  }

  speak(dialog){
    if(this.visible) this.dialogQueue.push(dialog);
    if(this.visible && 'speechSynthesis' in window){
      const utter = new SpeechSynthesisUtterance(dialog);
      utter.voice = speechSynthesis.getVoices().find(v=>v.lang.startsWith('en')) || null;
      utter.pitch = this.name==="Bubble"?1.2:1.0;
      utter.rate = 1.0;
      speechSynthesis.speak(utter);
    }
  }

  updateBubblePosition(){
    if(!this.visible) return;
    this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2.5,this.mesh.position.z);
    this.bubbleMesh.lookAt(camera.position);
  }
  nextDialog(){ if(this.dialogQueue.length>0 && this.visible){ const text=this.dialogQueue.shift(); this.updateBubble(text); } }
  learnColor(color){ this.knowledge.colorsSeen.add(color); }
  knowsColor(color){ return this.knowledge.colorsSeen.has(color); }
  learnStructure(structure){ this.knowledge.structuresSeen.push(structure); }
  learnObject(obj){ this.knowledge.objectsSeen.add(obj); }
  knowsObject(obj){ return this.knowledge.objectsSeen.has(obj); }
}

// ===== Characters =====
const bubbleMesh=new THREE.Mesh(
  new THREE.SphereGeometry(0.5),
  new THREE.MeshStandardMaterial({color:0x00ffcc})
);
const bubble=new Character(bubbleMesh,"Bubble");

const caineMesh=new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5,1.5),
  new THREE.MeshStandardMaterial({color:0xff4444})
);
const caine=new Character(caineMesh,"Caine");
caine.mesh.position.set(-5,0.75,-5);

// ===== Block/Object Types & Helper =====
const objectTypes=[
  'cube','cylinder','sphere','plane','capsule',
  'couch','bed','chair','table','food','water',
  'computer','speaker','grass','npc','pillow','toy','tree'
];

const blockColors=[0xff0000,0x00ff00,0x0000ff,0xffff00,0xff00ff,0x00ffff];

function pickColor(character){ for(const c of blockColors){ if(!character.knowsColor(c)) return c; } return blockColors[Math.floor(Math.random()*blockColors.length)]; }

function createBlockOfType(type,pos){
  let mesh,color = pickColor(caine);
  switch(type){
    case 'cube': mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color})); break;
    case 'cylinder': mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,2), new THREE.MeshStandardMaterial({color})); break;
    case 'sphere': mesh=new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color})); break;
    case 'plane': mesh=new THREE.Mesh(new THREE.PlaneGeometry(2,2), new THREE.MeshStandardMaterial({color})); mesh.rotation.x=-Math.PI/2; break;
    case 'capsule': mesh=new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1), new THREE.MeshStandardMaterial({color})); break;
    case 'couch': mesh=new THREE.Mesh(new THREE.BoxGeometry(2,1,1), new THREE.MeshStandardMaterial({color:0x884422})); break;
    case 'bed': mesh=new THREE.Mesh(new THREE.BoxGeometry(2,0.5,1), new THREE.MeshStandardMaterial({color:0xAAAAFF})); break;
    case 'chair': mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xAA8844})); break;
    case 'table': mesh=new THREE.Mesh(new THREE.BoxGeometry(2,0.2,1), new THREE.MeshStandardMaterial({color:0xCCCCAA})); break;
    case 'food': mesh=new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color:0xFFAA00})); break;
    case 'water': mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.5), new THREE.MeshStandardMaterial({color:0x00AAFF,transparent:true,opacity:0.7})); break;
    case 'computer': mesh=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.5,0.2), new THREE.MeshStandardMaterial({color:0x222222})); break;
    case 'speaker': mesh=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), new THREE.MeshStandardMaterial({color:0x333333})); break;
    case 'grass': mesh=new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshStandardMaterial({color:0x22AA22})); mesh.rotation.x=-Math.PI/2; break;
    case 'npc': mesh=new THREE.Mesh(new THREE.CapsuleGeometry(0.3,1), new THREE.MeshStandardMaterial({color:0xFFDD88})); break;
    case 'pillow': mesh=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.2,0.5), new THREE.MeshStandardMaterial({color:0xFF8888})); break;
    case 'toy': mesh=new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color:0xFF00FF})); break;
    case 'tree': mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,2), new THREE.MeshStandardMaterial({color:0x228822})); break;
  }
  mesh.position.copy(pos);
  return new AdventureObject(mesh,type);
}

// ===== Circus & Adventure Structures =====
let circusStructures=[],structures=[];
function createCircusStructure(basePos){ circusStructures.push({blocks:[], basePos:basePos.clone(), complete:false}); }
function createNewStructure(basePos){ structures.push({blocks:[], basePos:basePos.clone()}); }

createCircusStructure(new THREE.Vector3(0,0.5,0));
createCircusStructure(new THREE.Vector3(5,0.5,0));
createCircusStructure(new THREE.Vector3(-5,0.5,0));

createNewStructure(new THREE.Vector3(0,0.5,0));
createNewStructure(new THREE.Vector3(5,0.5,0));
createNewStructure(new THREE.Vector3(-5,0.5,0));

// ===== Build Logic =====
function nextBuildPosition(character){
  let targets = circusStructures.filter(s=>!s.complete);
  if(targets.length===0) targets = structures;
  let targetStructure=targets.reduce((min,s)=>s.blocks.length<min.blocks.length?s:min, targets[0]);
  let xOff=0,zOff=0,y=0,pos=new THREE.Vector3(),attempts=0;
  do{
    xOff = targetStructure.blocks.length%2;
    zOff = Math.floor(targetStructure.blocks.length/2)%2;
    y = Math.floor(targetStructure.blocks.length/4);
    pos.set(targetStructure.basePos.x+xOff,0.5+y,targetStructure.basePos.z+zOff);
    attempts++;
    if(targetStructure.blocks.some(b=>b.mesh.position.distanceTo(pos)<0.1)){
      pos.x += (Math.random()-0.5)*0.1; // smaller jitter
      pos.z += (Math.random()-0.5)*0.1;
    }
  } while(attempts<10 && targetStructure.blocks.some(b=>b.mesh.position.distanceTo(pos)<0.1));
  return {pos,targetStructure};
}

// ===== Player Interaction =====
let playerPos = new THREE.Vector3();
function updatePlayerPos(){ playerPos.copy(rig.position); }

// ===== Characters Thinking =====
const characters=[caine,bubble];
let lastActionTime=0;
function characterThink(character){
  if(!character.visible) return;
  const minDist=1.2;
  characters.forEach(other=>{
    if(other!==character){
      const dist=character.mesh.position.distanceTo(other.mesh.position);
      if(dist<minDist){
        const away=new THREE.Vector3().subVectors(character.mesh.position,other.mesh.position).normalize().multiplyScalar(0.05);
        character.mesh.position.add(away);
      }
    }
  });

  // Talking to player more frequently
  const distPlayer = character.mesh.position.distanceTo(playerPos);
  if(distPlayer<5 && Math.random()<0.05){
    const phrases=[
      "Welcome! Look at our circus!",
      "This tent is huge!",
      "I love adding new things!",
      "Watch Bubble work!",
      "The colors are amazing!",
      "Do you see the NPCs?",
      "Let's make a balloon arch!"
    ];
    character.speak(phrases[Math.floor(Math.random()*phrases.length)]);
    character.moveToward(playerPos,0.05);
  }

  // Random dialogue very often
  if(Math.random()<0.05){
    const phrases=[
      "Let's add more tents!","Look at this balloon!","The audience will love it!",
      "I need more blocks here.","This area looks fun!","A tree here looks good!",
      "Let's put a couch and a pillow!","Time for some toys!","We need a table and chairs!",
      "Computer for music? Great idea!","Speaker placement is perfect!","Let's add water here!"
    ];
    character.speak(phrases[Math.floor(Math.random()*phrases.length)]);
  }

  // Moving & building faster
  if(!character.targetPos){
    const {pos,targetStructure}=nextBuildPosition(character);
    character.targetPos=pos;
    character.currentStructure=targetStructure;
    character.nextType=objectTypes[Math.floor(Math.random()*objectTypes.length)];
  }
  const arrived = character.moveToward(character.targetPos,0.15);
  if(arrived || character.targetPos.distanceTo(character.mesh.position)<0.05){
    const block=createBlockOfType(character.nextType,character.targetPos);
    character.blocksPlaced.push(block);
    character.currentStructure.blocks.push(block);
    character.learnColor(pickColor(character));
    character.learnStructure(character.currentStructure);
    character.learnObject(character.nextType);
    if(circusStructures.includes(character.currentStructure) && character.currentStructure.blocks.length>=12){
      character.currentStructure.complete=true;
    }
    character.targetPos=null;
  }

  character.updateBubblePosition();
  character.nextDialog();
}

// ===== VR Controller Movement & Rotation =====
function handleVRControls(){
  const session = renderer.xr.getSession();
  if(!session) return;

  session.inputSources.forEach(source=>{
    if(source.gamepad){
      const axes = source.gamepad.axes;
      const speed = 0.05;
      rig.position.add(new THREE.Vector3(axes[2]*speed,0, -axes[3]*speed).applyEuler(rig.rotation));
      if(source.handedness==='right'){
        rig.rotation.y -= axes[2]*0.05;
      }
    }
  });
}

// ===== Animate Loop =====
function animate(){
  renderer.setAnimationLoop(()=>{
    updatePlayerPos();
    handleVRControls();
    const now=Date.now();
    if(now-lastActionTime>30){ characters.forEach(c=>characterThink(c)); lastActionTime=now; }
    renderer.render(scene,camera);
  });
}

// ===== Resize =====
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();
</script>
</body>
</html>
