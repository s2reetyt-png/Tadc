<!DOCTYPE html>
<html>
<head>
  <title>Caine VR AI Circus</title>
  <style>body{margin:0;overflow:hidden;}canvas{display:block;}#upload{position:absolute;top:10px;left:10px;z-index:1000;}</style>
</head>
<body>
<input type="file" id="upload" multiple>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ===== Scene & Camera =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const rig = new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

// ===== Renderer =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ===== Lights & Ground =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const dir = new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x444444, roughness:0.8, metalness:0})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== Adventure Object Class =====
class AdventureObject { constructor(mesh,type){ this.mesh=mesh; this.type=type; scene.add(mesh); }}

// ===== Character Class =====
class Character {
  constructor(mesh,name){
    this.mesh=mesh; this.name=name; this.blocksPlaced=[]; this.targetPos=null; this.currentStructure=null;
    this.dialogQueue=[]; this.knowledge={colorsSeen:new Set(),structuresSeen:[],objectsSeen:new Set()};
    this.visible=true; this.rememberedModels=[]; this.createBubble(); scene.add(mesh);
  }
  createBubble(){
    const canvas=document.createElement('canvas'); canvas.width=1024; canvas.height=256;
    this.ctx=canvas.getContext('2d');
    const texture=new THREE.CanvasTexture(canvas);
    const material=new THREE.MeshBasicMaterial({map:texture,transparent:true});
    this.bubbleMesh=new THREE.Mesh(new THREE.PlaneGeometry(6,1.5),material);
    this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2.5,this.mesh.position.z);
    scene.add(this.bubbleMesh); this.texture=texture; this.updateBubble("");
  }
  updateBubble(text){ this.ctx.clearRect(0,0,1024,256); this.ctx.fillStyle="white"; this.ctx.font="96px Arial"; this.ctx.fillText(text,20,160); this.texture.needsUpdate=true; this.bubbleText=text; }
  moveToward(target,speed=0.15){
    if(!this.visible) return true;
    const dir=new THREE.Vector3().subVectors(target,this.mesh.position); const distance=dir.length();
    if(distance<speed){ this.mesh.position.copy(target); return true; }
    dir.normalize(); this.mesh.position.add(dir.multiplyScalar(speed)); return false;
  }
  speak(dialog){ if(this.visible) this.dialogQueue.push(dialog); if(this.visible && 'speechSynthesis' in window){ const utter=new SpeechSynthesisUtterance(dialog); utter.voice=speechSynthesis.getVoices().find(v=>v.lang.startsWith('en'))||null; utter.pitch=this.name==="Bubble"?1.2:1.0; utter.rate=1.0; speechSynthesis.speak(utter); } }
  updateBubblePosition(){ if(!this.visible) return; this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2.5,this.mesh.position.z); this.bubbleMesh.lookAt(camera.position); }
  nextDialog(){ if(this.dialogQueue.length>0 && this.visible){ const text=this.dialogQueue.shift(); this.updateBubble(text); } }
  learnColor(color){ this.knowledge.colorsSeen.add(color); }
  knowsColor(color){ return this.knowledge.colorsSeen.has(color); }
  learnStructure(structure){ this.knowledge.structuresSeen.push(structure); }
  learnObject(obj){ this.knowledge.objectsSeen.add(obj); }
  knowsObject(obj){ return this.knowledge.objectsSeen.has(obj); }
  rememberModel(model){ this.rememberedModels.push(model); }
}

// ===== Characters =====
const bubbleMesh=new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color:0x00ffcc}));
const bubble=new Character(bubbleMesh,"Bubble");
const caineMesh=new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.5), new THREE.MeshStandardMaterial({color:0xff4444}));
const caine=new Character(caineMesh,"Caine");
caine.mesh.position.set(-5,0.75,-5);
const characters=[caine,bubble];

// ===== Helpers =====
const blockColors=[0xff0000,0x00ff00,0x0000ff,0xffff00,0xff00ff,0x00ffff];
function pickColor(character){ for(const c of blockColors){ if(!character.knowsColor(c)) return c; } return blockColors[Math.floor(Math.random()*blockColors.length)]; }
function createBlock(type,pos,color){ 
  let mesh; color=color||pickColor(caine);
  switch(type){
    case 'cube': mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color})); break;
    case 'sphere': mesh=new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color})); break;
    case 'cylinder': mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1), new THREE.MeshStandardMaterial({color})); break;
    default: mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color})); break;
  }
  mesh.position.copy(pos); return new AdventureObject(mesh,type);
}

// ===== Circus =====
const circusStructures=[];
function createCircus(basePos){ 
  const pos=new THREE.Vector3().copy(basePos);
  for(let i=0;i<3;i++){ for(let j=0;j<3;j++){ const b=createBlock('cube',pos.clone().add(new THREE.Vector3(i,0,j))); circusStructures.push(b); } } 
}
createCircus(new THREE.Vector3(0,0.5,0));
createCircus(new THREE.Vector3(5,0.5,0));
createCircus(new THREE.Vector3(-5,0.5,0));

// ===== Player =====
let playerPos=new THREE.Vector3();
function updatePlayerPos(){ playerPos.copy(rig.position); }

// ===== Build AI =====
let lastAction=0;
function characterThink(character){
  if(!character.visible) return;
  // Avoid others
  characters.forEach(other=>{ if(other!==character){ const dist=character.mesh.position.distanceTo(other.mesh.position); if(dist<1.2){ const away=new THREE.Vector3().subVectors(character.mesh.position,other.mesh.position).normalize().multiplyScalar(0.05); character.mesh.position.add(away); } }});
  // Random dialogue
  if(Math.random()<0.05){ const phrases=["I have ideas!","Let's build something new!","This looks fun!"]; character.speak(phrases[Math.floor(Math.random()*phrases.length)]); }
  // Auto-build remembered models
  if(character.rememberedModels.length>0 && !character.targetPos){
    const model=character.rememberedModels[Math.floor(Math.random()*character.rememberedModels.length)];
    const base=new THREE.Vector3(Math.random()*10-5,0.5,Math.random()*10-5);
    character.targetPos=base;
    character.currentModel=model;
  }
  if(character.targetPos && character.currentModel){
    const arrived=character.moveToward(character.targetPos,0.1);
    if(arrived){
      // Build model as blocks
      character.currentModel.blocks.forEach(b=>{
        const clone=createBlock(b.type,character.targetPos.clone().add(b.position),b.color);
        character.blocksPlaced.push(clone);
      });
      character.targetPos=null;
      character.currentModel=null;
    }
  }
  character.updateBubblePosition(); character.nextDialog();
}

// ===== VR Controls =====
function handleVRControls(){
  const session=renderer.xr.getSession(); if(!session) return;
  session.inputSources.forEach(source=>{ if(source.gamepad){ const axes=source.gamepad.axes; rig.position.add(new THREE.Vector3(axes[2]*0.05,0,-axes[3]*0.05).applyEuler(rig.rotation)); if(source.handedness==='right'){ rig.rotation.y -= axes[2]*0.05; }}});}
  
// ===== Upload Handling =====
const upload=document.getElementById('upload');
upload.addEventListener('change',e=>{
  Array.from(e.target.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        // Simple primitive approximation: 3x3x3 cubes
        const blocks=[];
        for(let x=0;x<3;x++){for(let y=0;y<3;y++){for(let z=0;z<3;z++){ blocks.push({position:new THREE.Vector3(x*0.6,y*0.6,z*0.6),type:'cube',color:0xff00ff}); }}}
        caine.rememberModel({blocks,source:file.name});
      }; img.src=ev.target.result;
    }; reader.readAsDataURL(file);
  });
});

// ===== Animate =====
function animate(){
  renderer.setAnimationLoop(()=>{
    updatePlayerPos();
    handleVRControls();
    const now=Date.now();
    if(now-lastAction>50){ characters.forEach(c=>characterThink(c)); lastAction=now; }
    renderer.render(scene,camera);
  });
}

// ===== Resize =====
window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });

animate();
</script>
</body>
</html>
