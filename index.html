<!DOCTYPE html>
<html>
<head>
  <title>TADC Full Game</title>
  <style>body{margin:0;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyDa1-37PaFtD0kOuhu7ZIwu1YYK_ZzRHX0",
  authDomain: "reets-games-fun.firebaseapp.com",
  databaseURL: "https://reets-games-fun-default-rtdb.firebaseio.com",
  projectId: "reets-games-fun",
  storageBucket: "reets-games-fun.firebasestorage.app",
  messagingSenderId: "38142200968",
  appId: "1:38142200968:web:6c1764770f2abad926a33d"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== SCENE & CAMERA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const rig = new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const dir = new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== CHARACTER CLASS =====
class Character {
  constructor(mesh,name){
    this.mesh=mesh; this.name=name; this.target=new THREE.Vector3();
    scene.add(mesh);
  }
  update(){
    if(!this.target) return;
    if(this.mesh.position.distanceTo(this.target)<1){
      this.target.set((Math.random()-0.5)*10,0.5,(Math.random()-0.5)*10);
    }
    const dir=new THREE.Vector3().subVectors(this.target,this.mesh.position).normalize();
    this.mesh.position.add(dir.multiplyScalar(0.03));
  }
}

// ===== CAINE & BUBBLE =====
const caineMesh=new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.5),new THREE.MeshStandardMaterial({color:0xff4444}));
const caine=new Character(caineMesh,"Caine");
const bubbleMesh=new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color:0x00ffcc}));
const bubble=new Character(bubbleMesh,"Bubble");
scene.remove(caine.mesh); scene.remove(bubble.mesh);

// ===== CUTSCENE VARIABLES =====
let cutsceneActive=true, cutsceneStep=0, cutsceneTimer=0;
let redCaine, blueCaine, feedObjects=[];
let computerScreen, screenCanvas, screenCtx, screenTexture;
let scriptLines=[
  "Initializing Caine AI...",
  "Loading behavioral modules...",
  "Injecting visual data...",
  "ERROR: instability detected",
  "Replacing instance...",
  "Execution complete.",
  "",
  "Enter Y/N ?"
];
let currentLine=0, currentChar=0, typedText="";

// ===== CUTSCENE 1 =====
function startCutscene1(){
  redCaine = new THREE.Mesh(new THREE.SphereGeometry(1),new THREE.MeshStandardMaterial({color:0xff0000}));
  redCaine.position.set(0,1,0); scene.add(redCaine);
}

// ===== CUTSCENE 2 =====
function createComputerScreen(){
  screenCanvas=document.createElement('canvas');
  screenCanvas.width=1024; screenCanvas.height=512;
  screenCtx=screenCanvas.getContext('2d');
  screenTexture=new THREE.CanvasTexture(screenCanvas);
  const material=new THREE.MeshBasicMaterial({map:screenTexture});
  computerScreen=new THREE.Mesh(new THREE.PlaneGeometry(6,3),material);
  computerScreen.position.set(0,2,-5);
  scene.add(computerScreen);
}
function updateComputerText(){
  if(currentLine>=scriptLines.length) return;
  if(Math.random()<0.5){
    const line=scriptLines[currentLine];
    typedText+=line[currentChar]||"";
    currentChar++;
    if(currentChar>line.length){ typedText+="\n"; currentLine++; currentChar=0; }
  }
  screenCtx.fillStyle="black";
  screenCtx.fillRect(0,0,1024,512);
  screenCtx.fillStyle="lime"; screenCtx.font="28px monospace";
  typedText.split("\n").forEach((l,i)=>{screenCtx.fillText(l,20,40+i*30)});
  screenTexture.needsUpdate=true;
}

// ===== OBJECTS =====
const types=['cube','sphere','cylinder'];
function createBlock(type,pos){
  let mesh;
  const color=Math.random()*0xffffff;
  if(type==='cube') mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color}));
  if(type==='sphere') mesh=new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color}));
  if(type==='cylinder') mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,2),new THREE.MeshStandardMaterial({color}));
  mesh.position.copy(pos); mesh.userData.isBlock=true; scene.add(mesh);
}

// ===== MULTIPLAYER =====
const playerId=Math.random().toString(36).substr(2,9);
function sendPlayer(){
  const playerRef=ref(db,'players/'+playerId);
  set(playerRef,{x:rig.position.x,y:rig.position.y,z:rig.position.z});
  onDisconnect(playerRef).remove();
}
const others={};
onValue(ref(db,'players'),snap=>{
  const data=snap.val()||{};
  for(let id in data){
    if(id===playerId) continue;
    if(!others[id]){
      const mesh=new THREE.Mesh(new THREE.CapsuleGeometry(0.3,1),new THREE.MeshStandardMaterial({color:0x00ff00}));
      scene.add(mesh); others[id]=mesh;
    }
    others[id].position.set(data[id].x,data[id].y,data[id].z);
  }
});

// ===== BUILD WITH CLICK =====
addEventListener('click',()=>{
  const pos=rig.position.clone(); pos.y=0.5;
  const type=types[Math.floor(Math.random()*types.length)];
  createBlock(type,pos);
  push(ref(db,'objects'),{type,pos});
});

// ===== CUTSCENE UPDATE =====
function updateCutscene(){
  cutsceneTimer++;
  if(cutsceneStep===0){
    if(cutsceneTimer%30===0){
      const cube=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3),new THREE.MeshStandardMaterial({color:0xffffff}));
      cube.position.set((Math.random()-0.5)*6,3,(Math.random()-0.5)*6);
      scene.add(cube); feedObjects.push(cube);
    }
    feedObjects.forEach(obj=>{
      const dir=new THREE.Vector3().subVectors(redCaine.position,obj.position).normalize();
      obj.position.add(dir.multiplyScalar(0.05));
    });
    if(cutsceneTimer>180){ cutsceneStep=1; cutsceneTimer=0; }
  }
  if(cutsceneStep===1){
    blueCaine=new THREE.Mesh(new THREE.SphereGeometry(1),new THREE.MeshStandardMaterial({color:0x0000ff}));
    blueCaine.position.set(5,1,0); scene.add(blueCaine);
    cutsceneStep=2;
  }
  if(cutsceneStep===2){
    const dir=new THREE.Vector3().subVectors(redCaine.position,blueCaine.position).normalize();
    blueCaine.position.add(dir.multiplyScalar(0.05));
    if(blueCaine.position.distanceTo(redCaine.position)<1){
      scene.remove(redCaine); cutsceneStep=3; cutsceneTimer=0;
    }
  }
  if(cutsceneStep===3 && cutsceneTimer>60){
    feedObjects.forEach(o=>scene.remove(o));
    scene.remove(blueCaine);
    createComputerScreen();
    cutsceneStep=4; cutsceneTimer=0;
  }
  if(cutsceneStep===4){
    updateComputerText();
    if(currentLine>=scriptLines.length){ cutsceneStep=5; cutsceneTimer=0; }
  }
  if(cutsceneStep===5){
    computerScreen.material.opacity=1-(cutsceneTimer/100);
    computerScreen.material.transparent=true;
    if(cutsceneTimer>100){
      scene.remove(computerScreen); cutsceneActive=false;
      scene.add(caine.mesh); scene.add(bubble.mesh);
    }
  }
}

// ===== PLAYER MOVEMENT =====
const keys={};
addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function move(){
  const speed=0.1;
  if(keys['w']) rig.position.z-=speed;
  if(keys['s']) rig.position.z+=speed;
  if(keys['a']) rig.position.x-=speed;
  if(keys['d']) rig.position.x+=speed;
}

// ===== ANIMATE LOOP =====
function animate(){
  requestAnimationFrame(animate);
  if(cutsceneActive) updateCutscene();
  else{ move(); sendPlayer(); caine.update(); bubble.update(); }
  renderer.render(scene,camera);
}
startCutscene1(); animate();

// ===== RESIZE =====
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
