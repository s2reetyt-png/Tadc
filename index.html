<!DOCTYPE html>

<html>
<head>
  <title>TADC VR Builder FIXED</title>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ===== BASIC SETUP =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const rig=new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

scene.add(new THREE.AmbientLight(0xffffff,1));
const light=new THREE.DirectionalLight(0xffffff,0.8);
light.position.set(5,10,5);
scene.add(light);

// ===== GROUND =====
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== GLOBALS =====
let inventory=[];
let inventoryIndex=0;

// ===== BLOCK CREATION =====
function createLabel(type){
const c=document.createElement('canvas');
c.width=256; c.height=64;
const ctx=c.getContext('2d');
ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.fillText(type,10,40);
return new THREE.CanvasTexture(c);
}

function createBlock(type,pos){
let geo;
const mat=new THREE.MeshStandardMaterial({
color:new THREE.Color().setHSL(Math.random(),0.7,0.5)
});

if(type==='cube') geo=new THREE.BoxGeometry(1,1,1);
if(type==='cylinder') geo=new THREE.CylinderGeometry(0.5,0.5,1);
if(type==='cone') geo=new THREE.ConeGeometry(0.6,1);
if(type==='pyramid') geo=new THREE.ConeGeometry(0.7,1,4);

const mesh=new THREE.Mesh(geo,mat);
mesh.position.copy(pos);
mesh.userData.type=type;

const label=new THREE.Mesh(
new THREE.PlaneGeometry(1,0.25),
new THREE.MeshBasicMaterial({map:createLabel(type),transparent:true})
);
label.position.y=1;
mesh.add(label);

scene.add(mesh);
return mesh;
}

// ===== PICKUP / PLACE =====
function getClosest(){
let closest=null,dist=2;
scene.traverse(o=>{
if(o.isMesh && o.userData.type){
const d=o.position.distanceTo(camera.position);
if(d<dist){closest=o;dist=d;}
}
});
return closest;
}

function pickup(){
const obj=getClosest();
if(obj){
inventory.push(obj.userData.type);
scene.remove(obj);
}
}

function place(){
if(!inventory.length) return;

const type=inventory[inventoryIndex];
const pos=camera.position.clone().add(
new THREE.Vector3(0,0,-2).applyQuaternion(camera.quaternion)
);

pos.x=Math.round(pos.x);
pos.y=Math.round(pos.y);
pos.z=Math.round(pos.z);

createBlock(type,pos);
}

function destroy(){
const obj=getClosest();
if(obj) scene.remove(obj);
}

function nextItem(){
if(!inventory.length) return;
inventoryIndex=(inventoryIndex+1)%inventory.length;
}

// ===== CONTROLS =====
window.addEventListener('keydown',e=>{
if(e.key==='e') pickup();
if(e.key==='q') place();
if(e.key==='f') destroy();
if(e.key==='r') nextItem();
});

// ===== CHARACTER =====
class Character{
constructor(mesh){
this.mesh=mesh;
this.build=null;
scene.add(mesh);
}

think(){
if(!this.build){
const types=['wall','pillar','tower'];
this.build={
type:types,
origin:this.mesh.position.clone(),
step:0
};
}

}
}

// ===== CHARACTERS =====
const caine=new Character(
new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.5),
new THREE.MeshStandardMaterial({color:0xff4444}))
);
caine.mesh.position.set(-5,0.75,-5);

const bubble=new Character(
new THREE.Mesh(new THREE.SphereGeometry(0.5),
new THREE.MeshStandardMaterial({color:0x00ffcc}))
);

// ===== LOOP =====
renderer.setAnimationLoop(()=>{
caine.think();
bubble.think();
renderer.render(scene,camera);
});

// ===== RESIZE =====
addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
}); </script>

</body>
