<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// VR rig (IMPORTANT: this is what moves in VR)
const rig = new THREE.Group();
scene.add(rig);
rig.add(camera);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const sunLight = new THREE.DirectionalLight(0xffffff, 1);
scene.add(sunLight);

// ================= FLOOR =================
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(50, 64),
  new THREE.MeshStandardMaterial({ color: 0xff4444 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// ================= WATER (BEACH AREA) =================
const water = new THREE.Mesh(
  new THREE.CircleGeometry(15, 64),
  new THREE.MeshStandardMaterial({ color: 0x3399ff, transparent: true, opacity: 0.6 })
);
water.rotation.x = -Math.PI / 2;
water.position.set(20, 0.1, 0);
scene.add(water);

// ================= SUN / MOON =================
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(2),
  new THREE.MeshBasicMaterial({ color: 0xffff00 })
);
scene.add(sun);

const moon = new THREE.Mesh(
  new THREE.SphereGeometry(1.5),
  new THREE.MeshBasicMaterial({ color: 0xccccff })
);
scene.add(moon);

// ================= ROLLER COASTER =================
const points = [];
for (let i = 0; i < 25; i++) {
  points.push(new THREE.Vector3(
    Math.sin(i * 0.4) * 12,
    Math.cos(i * 0.3) * 5 + 6,
    Math.cos(i * 0.4) * 12
  ));
}

const curve = new THREE.CatmullRomCurve3(points, true);

const track = new THREE.Mesh(
  new THREE.TubeGeometry(curve, 200, 0.25, 8, true),
  new THREE.MeshStandardMaterial({ color: 0x00ffcc })
);
scene.add(track);

// cart
const cart = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.5, 1),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
scene.add(cart);

// ================= VR RIDE STATE =================
let ride = false;
let t = 0;
let rideOffset = new THREE.Vector3();

// ================= INPUT =================
const keys = {};
addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;

  // toggle ride
  if (e.key.toLowerCase() === 'c') {
    ride = !ride;

    if (ride) {
      const pos = curve.getPointAt(t);
      rideOffset.copy(rig.position).sub(pos);
    }
  }
});

addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// ================= MOVEMENT =================
function move() {
  if (ride) return;

  const speed = 0.08;
  const dir = new THREE.Vector3();

  if (keys['w']) dir.z -= 1;
  if (keys['s']) dir.z += 1;
  if (keys['a']) dir.x -= 1;
  if (keys['d']) dir.x += 1;

  dir.normalize();
  dir.applyQuaternion(camera.quaternion);

  rig.position.addScaledVector(dir, speed);

  // swim slow zone
  const distToWater = rig.position.distanceTo(water.position);
  if (distToWater < 12) {
    rig.position.y = 1.4 + Math.sin(Date.now() * 0.003) * 0.2;
  } else {
    rig.position.y = 0;
  }
}

// ================= VR CONTROLLERS =================
function makeController(i) {
  const c = renderer.xr.getController(i);

  c.addEventListener('selectstart', () => {});
  scene.add(c);
}
makeController(0);
makeController(1);

// ================= LOOP =================
renderer.setAnimationLoop(() => {

  move();

  // coaster progress
  t += 0.0015;
  if (t > 1) t = 0;

  const pos = curve.getPointAt(t);
  const next = curve.getPointAt((t + 0.01) % 1);

  cart.position.copy(pos);

  // 🎢 VR RIDE FIX (IMPORTANT)
  if (ride) {
    rig.position.copy(pos).add(rideOffset);
    rig.lookAt(next);
  }

  // 🌞 day/night cycle
  const time = Date.now() * 0.0001;

  sun.position.set(Math.sin(time) * 30, Math.cos(time) * 30, 0);
  moon.position.set(-Math.sin(time) * 30, -Math.cos(time) * 30, 0);

  sunLight.position.copy(sun.position);
  sunLight.intensity = Math.max(0, sun.position.y / 20);

  // 🌊 water animation
  water.material.opacity = 0.5 + Math.sin(Date.now() * 0.002) * 0.2;

  renderer.render(scene, camera);
});

// ================= RESIZE =================
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
