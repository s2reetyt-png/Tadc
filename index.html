<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffc0ff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const rig = new THREE.Group();
scene.add(rig);
rig.add(camera);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const sunLight = new THREE.DirectionalLight(0xffffff, 1);
scene.add(sunLight);

// ================= WORLD =================
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(60, 64),
  new THREE.MeshStandardMaterial({ color: 0xff4444 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const water = new THREE.Mesh(
  new THREE.CircleGeometry(15, 64),
  new THREE.MeshStandardMaterial({ color: 0x3399ff, transparent: true, opacity: 0.6 })
);
water.rotation.x = -Math.PI / 2;
water.position.set(25, 0.1, 0);
scene.add(water);

// ================= SUN / MOON =================
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(2),
  new THREE.MeshBasicMaterial({ color: 0xffff00 })
);
scene.add(sun);

const moon = new THREE.Mesh(
  new THREE.SphereGeometry(1.5),
  new THREE.MeshBasicMaterial({ color: 0xccccff })
);
scene.add(moon);

// ================= ROLLER COASTER =================
const pts = [];
for (let i = 0; i < 25; i++) {
  pts.push(new THREE.Vector3(
    Math.sin(i * 0.4) * 12,
    Math.cos(i * 0.3) * 5 + 6,
    Math.cos(i * 0.4) * 12
  ));
}

const curve = new THREE.CatmullRomCurve3(pts, true);

const track = new THREE.Mesh(
  new THREE.TubeGeometry(curve, 200, 0.25, 8, true),
  new THREE.MeshStandardMaterial({ color: 0x00ffcc })
);
scene.add(track);

const cart = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.5, 1),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
scene.add(cart);

// ================= FERRIS WHEEL =================
const wheel = new THREE.Group();
scene.add(wheel);

const ring = new THREE.Mesh(
  new THREE.TorusGeometry(5, 0.3, 16, 100),
  new THREE.MeshStandardMaterial({ color: 0xffff00 })
);
wheel.add(ring);

for (let i = 0; i < 8; i++) {
  const seat = new THREE.Mesh(
    new THREE.BoxGeometry(1, 0.5, 1),
    new THREE.MeshStandardMaterial({ color: 0xff00ff })
  );
  seat.position.set(Math.cos(i * Math.PI / 4) * 5, Math.sin(i * Math.PI / 4) * 5, 0);
  wheel.add(seat);
}
wheel.position.set(-20, 6, 0);

// ================= VR HANDS =================
function makeController(i) {
  const c = renderer.xr.getController(i);

  const hand = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.1, 0.3),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );

  c.add(hand);
  scene.add(c);
}
makeController(0);
makeController(1);

// ================= PLAYER MOVEMENT (NO BUILD) =================
const keys = {};
addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function movePlayer() {
  const dir = new THREE.Vector3();

  if (keys['w']) dir.z -= 1;
  if (keys['s']) dir.z += 1;
  if (keys['a']) dir.x -= 1;
  if (keys['d']) dir.x += 1;

  dir.normalize();
  dir.applyQuaternion(camera.quaternion);

  rig.position.addScaledVector(dir, 0.08);

  if (rig.position.distanceTo(water.position) < 12) {
    rig.position.y = 1.4 + Math.sin(Date.now() * 0.003) * 0.2;
  } else {
    rig.position.y = 0;
  }
}

// ================= ROLLER COASTER RIDE =================
let ride = false;
let t = 0;
let rideOffset = new THREE.Vector3();

addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'c') {
    ride = !ride;

    if (ride) {
      const p = curve.getPointAt(t);
      rideOffset.copy(rig.position).sub(p);
    }
  }
});

// ================= CAINE + BUBBLE BUILD SYSTEM =================
function createBlock(pos, color = Math.random() * 0xffffff) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({ color })
  );
  mesh.position.copy(pos);
  scene.add(mesh);
  return mesh;
}

class Character {
  constructor(mesh) {
    this.mesh = mesh;
    this.target = mesh.position.clone();
    this.timer = 0;
    scene.add(mesh);
  }

  update() {
    this.timer++;

    // pick new target
    if (this.mesh.position.distanceTo(this.target) < 0.5) {
      this.target.set(
        (Math.random() - 0.5) * 30,
        1,
        (Math.random() - 0.5) * 30
      );

      // 🧱 THEY BUILD (NOT PLAYER)
      for (let i = 0; i < 3; i++) {
        createBlock(
          this.mesh.position.clone().add(new THREE.Vector3(i, 0, 0))
        );
      }
    }

    this.mesh.position.lerp(this.target, 0.03);
  }
}

// CAINE
const caine = new Character(
  new THREE.Mesh(
    new THREE.CapsuleGeometry(0.5, 1.5),
    new THREE.MeshStandardMaterial({ color: 0xff0000 })
  )
);
caine.mesh.position.set(-5, 1, -5);

// BUBBLE
const bubble = new Character(
  new THREE.Mesh(
    new THREE.SphereGeometry(0.5),
    new THREE.MeshStandardMaterial({ color: 0x00ffff })
  )
);
bubble.mesh.position.set(5, 1, -5);

// ================= LOOP =================
renderer.setAnimationLoop(() => {

  movePlayer();

  // coaster motion
  t += 0.0015;
  if (t > 1) t = 0;

  const pos = curve.getPointAt(t);
  const next = curve.getPointAt((t + 0.01) % 1);

  cart.position.copy(pos);

  if (ride) {
    rig.position.copy(pos).add(rideOffset);
    rig.lookAt(next);
  }

  // ferris wheel
  wheel.rotation.z += 0.002;

  // day/night
  const time = Date.now() * 0.0001;
  sun.position.set(Math.sin(time) * 30, Math.cos(time) * 30, 0);
  moon.position.set(-Math.sin(time) * 30, -Math.cos(time) * 30, 0);
  sunLight.position.copy(sun.position);

  // AI update
  caine.update();
  bubble.update();

  renderer.render(scene, camera);
});

// ================= RESIZE =================
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
