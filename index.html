<!DOCTYPE html>
<html>
<head>
  <title>Persistent VR Circus</title>
  <style>body{margin:0;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ===== Scene =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const rig=new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

// ===== Renderer =====
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ===== Lights =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const dir=new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

// ===== Ground =====
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== Object =====
class AdventureObject{
  constructor(mesh,type){
    this.mesh=mesh;
    this.type=type;
    scene.add(mesh);
  }
}

// ===== Character =====
class Character{
  constructor(mesh,name){
    this.mesh=mesh;
    this.name=name;

    this.goal="social";
    this.mood="happy";

    this.personality={
      talkative:name==="Caine"?0.9:0.5,
      builder:name==="Caine"?0.8:0.4,
      playful:name==="Bubble"?0.9:0.3
    };

    this.targetPos=null;
    this.currentStructure=null;
    this.dialogQueue=[];

    this.createBubble();
    scene.add(mesh);
  }

  createBubble(){
    const c=document.createElement('canvas');
    c.width=1024;c.height=256;
    this.ctx=c.getContext('2d');
    this.tex=new THREE.CanvasTexture(c);

    this.bubble=new THREE.Mesh(
      new THREE.PlaneGeometry(6,1.5),
      new THREE.MeshBasicMaterial({map:this.tex,transparent:true})
    );
    scene.add(this.bubble);
  }

  speak(t){
    this.dialogQueue.push(t);
    if('speechSynthesis' in window){
      const u=new SpeechSynthesisUtterance(t);
      u.pitch=this.name==="Bubble"?1.2:1;
      speechSynthesis.speak(u);
    }
  }

  updateBubble(){
    if(this.dialogQueue.length>0){
      this.ctx.clearRect(0,0,1024,256);
      this.ctx.fillStyle="white";
      this.ctx.font="80px Arial";
      this.ctx.fillText(this.dialogQueue.shift(),20,150);
      this.tex.needsUpdate=true;
    }

    this.bubble.position.set(
      this.mesh.position.x,
      this.mesh.position.y+2.5,
      this.mesh.position.z
    );
    this.bubble.lookAt(camera.position);
  }

  move(t,s=0.1){
    const d=new THREE.Vector3().subVectors(t,this.mesh.position);
    if(d.length()<s){this.mesh.position.copy(t);return true;}
    d.normalize();
    this.mesh.position.add(d.multiplyScalar(s));
    return false;
  }
}

// ===== Characters =====
const bubble=new Character(
  new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color:0x00ffcc})),"Bubble"
);

const caine=new Character(
  new THREE.Mesh(new THREE.CapsuleGeometry(0.5,1.5),new THREE.MeshStandardMaterial({color:0xff4444})),"Caine"
);

caine.mesh.position.set(-5,0.75,-5);
const characters=[caine,bubble];

// ===== Block Creator =====
function createBlock(type,pos){
  let m;

  if(type==="tent") m=new THREE.Mesh(new THREE.CylinderGeometry(2,2,3,16),new THREE.MeshStandardMaterial({color:0xff0000}));
  else if(type==="stage") m=new THREE.Mesh(new THREE.BoxGeometry(4,0.5,4),new THREE.MeshStandardMaterial({color:0x222222}));
  else if(type==="seat") m=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0xAA8844}));
  else m=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0xffffff}));

  m.position.copy(pos);
  return new AdventureObject(m,type);
}

// ===== Structures =====
let structures=[];

// ===== SAVE / LOAD =====
const SAVE_KEY="circus_save";

function save(){
  const data=structures.map(s=>({
    type:s.type,
    pos:s.base.toArray()
  }));
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));
}

function load(){
  const d=JSON.parse(localStorage.getItem(SAVE_KEY));
  if(!d) return false;

  d.forEach(s=>{
    createStructure(new THREE.Vector3().fromArray(s.pos),s.type);
  });

  return true;
}

// ===== BUILD FULL CIRCUS =====
function createStructure(pos,type){
  const s={base:pos,type};
  structures.push(s);

  if(type==="tent"){
    createBlock("tent",pos);
  }

  if(type==="stage"){
    createBlock("stage",pos);
  }

  if(type==="seating"){
    for(let i=0;i<6;i++){
      createBlock("seat",pos.clone().add(new THREE.Vector3(i%3,0,i>2?1:0)));
    }
  }
}

// instant build if no save
if(!load()){
  createStructure(new THREE.Vector3(0,0.5,0),"tent");
  createStructure(new THREE.Vector3(6,0.5,0),"stage");
  createStructure(new THREE.Vector3(-6,0.5,0),"seating");
  save();
}

// ===== Voting =====
let vote=null, voteTimer=0, activeAdventure=null;

function startVote(){
  vote={
    options:["tent","stage","seating"],
    votes:[0,0,0],
    time:300
  };
  caine.speak("Vote for the next adventure!");
}

function updateVote(playerPos){
  voteTimer++;

  if(!vote && voteTimer>900){
    voteTimer=0;
    startVote();
  }

  if(vote){
    vote.time--;

    if(playerPos.distanceTo(caine.mesh.position)<4){
      vote.votes[Math.floor(Math.random()*3)]+=0.1;
    }

    if(vote.time<=0){
      let i=vote.votes.indexOf(Math.max(...vote.votes));
      activeAdventure=vote.options[i];

      caine.speak("Adventure: "+activeAdventure);

      vote=null;
    }
  }
}

// ===== Player =====
let playerPos=new THREE.Vector3();
function updatePlayer(){ playerPos.copy(rig.position); }

// ===== AI =====
function think(c){

  if(c===caine && !activeAdventure){
    c.goal="social";
  }

  if(Math.random()<0.02){
    c.goal=["explore","social","decorate"][Math.floor(Math.random()*3)];
  }

  if(c.goal==="explore"){
    if(!c.targetPos){
      c.targetPos=new THREE.Vector3((Math.random()-0.5)*10,0.5,(Math.random()-0.5)*10);
    }
    c.move(c.targetPos,0.08);
  }

  if(c.goal==="social"){
    let o=characters.find(x=>x!==c);
    c.move(o.mesh.position,0.08);
  }

  if(c===caine && activeAdventure){
    if(!c.targetPos){
      c.targetPos=new THREE.Vector3((Math.random()-0.5)*10,0.5,(Math.random()-0.5)*10);
    }

    if(c.move(c.targetPos,0.1)){
      createStructure(c.targetPos,activeAdventure);
      save();
      activeAdventure=null;
      c.speak("Adventure complete!");
    }
  }

  c.updateBubble();
}

// ===== VR =====
function vr(){
  const s=renderer.xr.getSession();
  if(!s)return;
  s.inputSources.forEach(src=>{
    if(src.gamepad){
      rig.position.x+=src.gamepad.axes[2]*0.05;
      rig.position.z+=-src.gamepad.axes[3]*0.05;
    }
  });
}

// ===== LOOP =====
renderer.setAnimationLoop(()=>{
  updatePlayer();
  vr();
  updateVote(playerPos);

  characters.forEach(think);

  renderer.render(scene,camera);
});

// ===== Resize =====
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
