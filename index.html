<!DOCTYPE html>
<html>
<head>
<title>VR Circus Online</title>
<style>body{margin:0;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

/////////////////////////
// BASIC VR SETUP
/////////////////////////
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const rig = new THREE.Group();
rig.add(camera);
scene.add(rig);
camera.position.set(0,1.6,3);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

scene.add(new THREE.AmbientLight(0xffffff,1));
const light = new THREE.DirectionalLight(0xffffff,0.8);
light.position.set(5,10,5);
scene.add(light);

/////////////////////////
// GROUND + CIRCUS
/////////////////////////
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// prebuilt circus
for(let i=0;i<6;i++){
  const tent = new THREE.Mesh(
    new THREE.ConeGeometry(2,3,16),
    new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
  );
  tent.position.set(Math.cos(i)*10,1.5,Math.sin(i)*10);
  scene.add(tent);
}

/////////////////////////
// PLAYER
/////////////////////////
const names = ["Echo","Nova","Fizz","Luna","Pixel","Zig","Bubbles"];
const myName = names[Math.floor(Math.random()*names.length)];

const player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.3,1),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
scene.add(player);

// name label
function makeText(text){
  const c=document.createElement("canvas");
  c.width=256;c.height=64;
  const ctx=c.getContext("2d");
  ctx.fillStyle="white";
  ctx.font="28px Arial";
  ctx.fillText(text,10,40);
  return new THREE.CanvasTexture(c);
}
const nameMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(1,0.25),
  new THREE.MeshBasicMaterial({map:makeText(myName),transparent:true})
);
scene.add(nameMesh);

/////////////////////////
// WEBSOCKET MULTIPLAYER
/////////////////////////
const socket = new WebSocket("wss://38e721d4-ef0d-425c-bfcd-1887d6f001ee-00-2hzg027jezh8.worf.replit.dev");
let id = Math.random().toString(36).slice(2);
const players = {};

socket.onmessage = e=>{
  const d = JSON.parse(e.data);

  if(d.id===id) return;

  if(!players[d.id]){
    const m = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.3,1),
      new THREE.MeshStandardMaterial({color:0x00ff88})
    );
    scene.add(m);
    players[d.id]={mesh:m};
  }

  players[d.id].mesh.position.fromArray(d.pos);
};

function send(){
  if(socket.readyState===1){
    socket.send(JSON.stringify({
      id,
      pos: rig.position.toArray()
    }));
  }
}

/////////////////////////
// VOICE CHAT (WEBRTC)
/////////////////////////
let localStream;
navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{
  localStream = stream;
})
.catch(()=>console.log("mic blocked"));

/////////////////////////
// AI SYSTEM
/////////////////////////
class AI{
  constructor(name,color,x,z){
    this.mesh = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.5,1.5),
      new THREE.MeshStandardMaterial({color})
    );
    this.mesh.position.set(x,0.75,z);
    scene.add(this.mesh);
    this.name=name;
  }

  speak(text){
    if('speechSynthesis' in window){
      const u=new SpeechSynthesisUtterance(text);
      speechSynthesis.speak(u);
    }
  }

  think(){
    // random movement
    this.mesh.position.x += (Math.random()-0.5)*0.05;
    this.mesh.position.z += (Math.random()-0.5)*0.05;
  }
}

const caine = new AI("Caine",0xff4444,-3,0);
const bubble = new AI("Bubble",0x00ffcc,3,0);

/////////////////////////
// AI MEMORY
/////////////////////////
let memory = JSON.parse(localStorage.getItem("circusMemory")||"[]");

function remember(item){
  memory.push(item);
  localStorage.setItem("circusMemory",JSON.stringify(memory));
}

/////////////////////////
// ADVENTURES
/////////////////////////
const ideas = ["ball pit","ice cream land","giant slide","npc party","music stage"];

function aiAdventure(){
  if(Math.random()<0.01){
    const idea = ideas[Math.floor(Math.random()*ideas.length)];
    caine.speak("New adventure: "+idea);
    remember(idea);

    const obj = new THREE.Mesh(
      new THREE.BoxGeometry(2,2,2),
      new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
    );
    obj.position.set(Math.random()*10-5,1,Math.random()*10-5);
    scene.add(obj);

    setTimeout(()=>{
      bubble.speak("That sounds fun!");
    },2000);
  }
}

/////////////////////////
// VOTING SYSTEM
/////////////////////////
let voteTimer = 0;

function voting(){
  voteTimer++;
  if(voteTimer>600){ // ~10 min
    voteTimer=0;
    caine.speak("Voting time! What adventure?");
    
    setTimeout(()=>{
      const winner = ideas[Math.floor(Math.random()*ideas.length)];
      caine.speak("We will do "+winner);
    },5000);
  }
}

/////////////////////////
// JOIN ANNOUNCEMENT
/////////////////////////
setTimeout(()=>{
  caine.speak("My my, a new person has entered the circus. Look around and enjoy.");
},6000);

/////////////////////////
// MOVEMENT FIX
/////////////////////////
function controls(){
  const s = renderer.xr.getSession();
  if(!s) return;

  s.inputSources.forEach(src=>{
    if(src.gamepad){
      const a = src.gamepad.axes;
      const speed = 0.05;

      rig.position.add(
        new THREE.Vector3(-a[2]*speed,0,a[3]*speed)
        .applyEuler(rig.rotation)
      );
    }
  });
}

/////////////////////////
// LOOP
/////////////////////////
renderer.setAnimationLoop(()=>{
  controls();

  player.position.copy(rig.position);
  nameMesh.position.set(rig.position.x,rig.position.y+2,rig.position.z);

  send();
  caine.think();
  bubble.think();
  aiAdventure();
  voting();

  renderer.render(scene,camera);
});

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
