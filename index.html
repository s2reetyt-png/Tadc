<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ================= VR RIG =================
const rig = new THREE.Group();
const head = new THREE.Group();
rig.add(head);
head.add(camera);
camera.position.set(0, 0, 0);

scene.add(rig);
rig.position.set(0, 0, 0);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
scene.add(new THREE.DirectionalLight(0xffffff, 1));

// ================= GROUND =================
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({ color: 0x44aa44 })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ================= OBJECTS YOU CAN PICK UP =================
const objects = [];

function makePickup(pos){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(0.4,0.4,0.4),
    new THREE.MeshStandardMaterial({ color: Math.random()*0xffffff })
  );
  m.position.copy(pos);
  scene.add(m);
  objects.push(m);
}

for(let i=0;i<10;i++){
  makePickup(new THREE.Vector3((Math.random()-0.5)*10,1,(Math.random()-0.5)*10));
}

// ================= VR HANDS (REAL TRACKED CONTROLLERS) =================
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);

scene.add(controller0);
scene.add(controller1);

// visual hands that FOLLOW controllers
function makeHand(color){
  const hand = new THREE.Mesh(
    new THREE.BoxGeometry(0.1,0.1,0.2),
    new THREE.MeshStandardMaterial({ color })
  );
  return hand;
}

const handMesh0 = makeHand(0xffffff);
const handMesh1 = makeHand(0xffffff);

controller0.add(handMesh0);
controller1.add(handMesh1);

// ================= GRAB SYSTEM =================
let held = [null, null];

function tryGrab(i, controller){
  const origin = new THREE.Vector3();
  controller.getWorldPosition(origin);

  let closest = null;
  let dist = 1.2;

  for(const obj of objects){
    const d = obj.position.distanceTo(origin);
    if(d < dist){
      closest = obj;
      dist = d;
    }
  }

  if(closest){
    held[i] = closest;
  }
}

function release(i){
  held[i] = null;
}

// controller events
controller0.addEventListener('selectstart', ()=>tryGrab(0, controller0));
controller0.addEventListener('selectend', ()=>release(0));

controller1.addEventListener('selectstart', ()=>tryGrab(1, controller1));
controller1.addEventListener('selectend', ()=>release(1));

// ================= COASTER =================
let t = 0;

const path = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,2,0),
  new THREE.Vector3(5,3,-5),
  new THREE.Vector3(0,4,-10),
  new THREE.Vector3(-5,3,-5),
  new THREE.Vector3(0,2,0)
]);

const cart = new THREE.Mesh(
  new THREE.BoxGeometry(1,0.5,1),
  new THREE.MeshStandardMaterial({ color:0xff0000 })
);
scene.add(cart);

// ================= MOVEMENT (LEFT STICK SIMPLE) =================
let leftGamepad = null;

controller0.addEventListener('connected', (e)=>{
  if(e.data?.handedness === 'left'){
    leftGamepad = e.data.gamepad;
  }
});

function updateMovement(){

  if(leftGamepad){
    const x = leftGamepad.axes[2] || 0;
    const y = leftGamepad.axes[3] || 0;

    const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    forward.y = 0;
    forward.normalize();

    const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
    right.y = 0;
    right.normalize();

    rig.position.addScaledVector(forward, -y * 0.06);
    rig.position.addScaledVector(right, x * 0.06);
  }
}

// ================= LOOP =================
renderer.setAnimationLoop(()=>{

  updateMovement();

  // coaster
  t += 0.0015;
  if(t > 1) t = 0;

  const pos = path.getPointAt(t);
  cart.position.copy(pos);

  // update held objects (follow hands)
  controller0.getWorldPosition(new THREE.Vector3()).toArray;
  controller1.getWorldPosition(new THREE.Vector3()).toArray;

  if(held[0]){
    controller0.getWorldPosition(held[0].position);
  }

  if(held[1]){
    controller1.getWorldPosition(held[1].position);
  }

  renderer.render(scene,camera);
});

// ================= RESIZE =================
addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
