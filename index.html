<!DOCTYPE html>
<html>
<head>
  <title>Caine & Bubble VR Circus Adventures</title>
  <style>body{margin:0;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// ===== Scene & Camera =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // daytime sky
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(12,10,12);
camera.lookAt(0,0,0);

// ===== Renderer =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// ===== Lights =====
scene.add(new THREE.AmbientLight(0xffffff,1));
const dir = new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

// ===== Ground =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x444444, roughness:0.8, metalness:0})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== GLTF Loader =====
const loader = new GLTFLoader();

// ===== Load Circus Tent =====
loader.load('models/tadc_tent_beta.glb', gltf=>{
  const tent = gltf.scene;
  tent.position.set(0,0,0);
  tent.scale.set(2,2,2);
  scene.add(tent);
});

// ===== Adventure Object Class =====
class AdventureObject {
  constructor(mesh,type){
    this.mesh=mesh;
    this.type=type;
    scene.add(mesh);
  }
}

// ===== Character Class =====
class Character {
  constructor(mesh,name){
    this.mesh=mesh;
    this.name=name;
    this.blocksPlaced=[];
    this.targetPos=null;
    this.currentStructure=null;
    this.dialogQueue=[];
    this.knowledge={colorsSeen:new Set(),structuresSeen:[]};
    this.visible=true;
    this.createBubble();
    scene.add(mesh);
  }

  createBubble(){
    const canvas=document.createElement('canvas');
    canvas.width=1024; canvas.height=256;
    this.ctx=canvas.getContext('2d');
    const texture=new THREE.CanvasTexture(canvas);
    const material=new THREE.MeshBasicMaterial({map:texture,transparent:true});
    this.bubbleMesh=new THREE.Mesh(new THREE.PlaneGeometry(6,1.5),material);
    this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2.5,this.mesh.position.z);
    scene.add(this.bubbleMesh);
    this.texture=texture;
    this.updateBubble("");
  }

  updateBubble(text){
    this.ctx.clearRect(0,0,1024,256);
    this.ctx.fillStyle="white";
    this.ctx.font="72px Arial";
    this.ctx.fillText(text,20,160);
    this.texture.needsUpdate=true;
    this.bubbleText=text;
  }

  moveToward(target,speed=0.07){
    if(!this.visible) return true;
    const dir=new THREE.Vector3().subVectors(target,this.mesh.position);
    const distance=dir.length();
    if(distance<speed){
      this.mesh.position.copy(target);
      return true;
    }
    dir.normalize();
    this.mesh.position.add(dir.multiplyScalar(speed));
    return false;
  }

  speak(dialog){ if(this.visible) this.dialogQueue.push(dialog); }
  updateBubblePosition(){
    if(!this.visible) return;
    this.bubbleMesh.position.set(this.mesh.position.x,this.mesh.position.y+2.5,this.mesh.position.z);
    this.bubbleMesh.lookAt(camera.position);
  }
  nextDialog(){ if(this.dialogQueue.length>0 && this.visible){ const text=this.dialogQueue.shift(); this.updateBubble(text); } }
  learnColor(color){ this.knowledge.colorsSeen.add(color); }
  knowsColor(color){ return this.knowledge.colorsSeen.has(color); }
  learnStructure(structure){ this.knowledge.structuresSeen.push(structure); }
}

// ===== Characters =====
const bubbleMesh=new THREE.Mesh(
  new THREE.SphereGeometry(0.5),
  new THREE.MeshStandardMaterial({color:0x00ffcc})
);
const bubble=new Character(bubbleMesh,"Bubble");

const caineMesh=new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5,1.5),
  new THREE.MeshStandardMaterial({color:0xff4444})
);
const caine=new Character(caineMesh,"Caine");
caine.mesh.position.set(-5,0.75,-5);

// ===== Object Types & Helper =====
const objectTypes=[
  {type:'tree',url:'models/tree.glb',scale:1.5},
  {type:'couch',url:'models/couch.glb',scale:1},
  {type:'npc',url:'models/npc.glb',scale:1},
  {type:'computer',url:'models/computer.glb',scale:1},
  {type:'balloon',url:'models/balloon.glb',scale:0.5},
  {type:'pillow',url:'models/pillow.glb',scale:0.5},
  {type:'toy',url:'models/toy.glb',scale:0.5},
  {type:'table',url:'models/table.glb',scale:1},
  {type:'chair',url:'models/chair.glb',scale:1}
];

function pickObjectType(character){ return objectTypes[Math.floor(Math.random()*objectTypes.length)]; }

async function createObjectOfType(typeObj,pos){
  return new Promise(resolve=>{
    loader.load(typeObj.url,gltf=>{
      const mesh=gltf.scene;
      mesh.position.copy(pos);
      mesh.scale.set(typeObj.scale,typeObj.scale,typeObj.scale);
      scene.add(mesh);
      resolve(new AdventureObject(mesh,typeObj.type));
    });
  });
}

// ===== Adventure Structures =====
let structures=[];
function createNewStructure(basePos){ structures.push({blocks:[], basePos:basePos.clone()}); }
createNewStructure(new THREE.Vector3(0,0.5,0));
createNewStructure(new THREE.Vector3(5,0.5,0));
createNewStructure(new THREE.Vector3(-5,0.5,0));

// ===== Build Logic =====
async function nextBuildPosition(character){
  let targetStructure=structures.reduce((min,s)=>s.blocks.length<min.blocks.length?s:min, structures[0]);
  let xOff = targetStructure.blocks.length%3;
  let zOff = Math.floor(targetStructure.blocks.length/3)%3;
  let y = Math.floor(targetStructure.blocks.length/9);
  let pos=new THREE.Vector3(targetStructure.basePos.x+xOff,0.5+y,targetStructure.basePos.z+zOff);
  return {pos,targetStructure};
}

// ===== Player Interaction =====
let playerPos = new THREE.Vector3();
function updatePlayerPos(){ playerPos.setFromMatrixPosition(camera.matrixWorld); }

// ===== Characters Thinking =====
const characters=[caine,bubble];
let lastActionTime=0;
async function characterThink(character){
  if(!character.visible) return;

  // Avoid overlapping
  const minDist=1.2;
  characters.forEach(other=>{
    if(other!==character){
      const dist=character.mesh.position.distanceTo(other.mesh.position);
      if(dist<minDist){
        const away=new THREE.Vector3().subVectors(character.mesh.position,other.mesh.position).normalize().multiplyScalar(0.05);
        character.mesh.position.add(away);
      }
    }
  });

  // Talking to player if nearby
  const distPlayer = character.mesh.position.distanceTo(playerPos);
  if(distPlayer<5 && Math.random()<0.05){
    const phrases=["Hi there! Watch our circus!","Look what we built!","Isn’t this fun?","Come explore!","Check out the adventure!"];
    character.speak(phrases[Math.floor(Math.random()*phrases.length)]);
    character.moveToward(playerPos,0.03);
  }

  // Random dialogue
  if(Math.random()<0.05){
    const phrases=[
      "Let's add more tents!","Look at this balloon!","The audience will love it!","I need more objects here.","This area looks fun!","We could add a tree!","Let's put a computer there!","A pillow here would be nice!","More toys for fun!"
    ];
    character.speak(phrases[Math.floor(Math.random()*phrases.length)]);
  }

  // Moving & building
  if(!character.targetPos){
    const {pos,targetStructure}=await nextBuildPosition(character);
    character.targetPos=pos;
    character.currentStructure=targetStructure;
    character.nextType=pickObjectType(character);
  }
  const arrived = character.moveToward(character.targetPos,0.07);
  if(arrived || character.targetPos.distanceTo(character.mesh.position)<0.05){
    const block=await createObjectOfType(character.nextType,character.targetPos);
    character.blocksPlaced.push(block);
    character.currentStructure.blocks.push(block);
    character.targetPos=null;
  }

  character.updateBubblePosition();
  character.nextDialog();
}

// ===== Animate Loop =====
function animate(){
  renderer.setAnimationLoop(async ()=>{
    updatePlayerPos();
    const now=Date.now();
    if(now-lastActionTime>50){ for(const c of characters){ await characterThink(c); } lastActionTime=now; }
    renderer.render(scene,camera);
  });
}

// ===== Resize =====
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();
</script>
</body>
</html>
